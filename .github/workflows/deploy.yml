name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to "master" if your default branch is master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./AHKGenerator # Tell npm where package.json is
        run: npm ci

      - name: Build Project
        working-directory: ./AHKGenerator
        run: npm run build

      - name: Setup Pages Settings
        uses: actions/configure-pages@v5

      - name: Upload Built Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: './AHKGenerator/dist' # Path to your built directory

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
